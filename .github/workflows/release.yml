name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish app
    runs-on: macos-15
    steps:
      - name: Validate manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if ! git ls-remote --exit-code --tags "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" "refs/tags/$TAG" >/dev/null; then
            echo "Tag '$TAG' does not exist." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        env:
          REF: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          printf 'tag=%s\n' "$REF" >> "$GITHUB_OUTPUT"
          printf 'version=%s\n' "${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Install tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import code-signing certificate
        env:
          CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          CERT_PASSWORD: ${{ secrets.MACOS_CERT_P12_PASSWORD }}
        run: |
          # Sign releases with a stable self-signed certificate (not ad-hoc): Sparkle requires
          # the old and new app to share the same signing identity to validate an update, which
          # ad-hoc's per-build signatures can never satisfy. The cert is self-signed (the app is
          # not notarized); update integrity still rests on the EdDSA signature.
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW=$(openssl rand -base64 24)
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" -P "$CERT_PASSWORD" -T /usr/bin/codesign
          rm -f "$RUNNER_TEMP/cert.p12"
          # Let codesign use the key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PW" "$KEYCHAIN" >/dev/null
          # Make the keychain searchable by xcodebuild's codesign.
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | sed -e 's/"//g')
          echo "SIGN_KEYCHAIN=$KEYCHAIN" >> "$GITHUB_ENV"

      - name: Build Release app (self-signed)
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project Aranet4Logger.xcodeproj \
            -scheme Aranet4Logger \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="$APP_VERSION" \
            CURRENT_PROJECT_VERSION="$APP_VERSION" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Aranet4 Logger" \
            CODE_SIGNING_REQUIRED=YES \
            CODE_SIGNING_ALLOWED=YES \
            OTHER_CODE_SIGN_FLAGS="--keychain $SIGN_KEYCHAIN"

      - name: Package .app into a zip
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          APP="build/Build/Products/Release/Aranet4Logger.app"
          ZIP="Aranet4Logger-$RELEASE_TAG.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Sign update and generate Sparkle appcast
        env:
          SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -o pipefail
          # Sparkle's command-line tools (sign_update) ship in the release tarball.
          curl -sL -o sparkle.tar.xz \
            https://github.com/sparkle-project/Sparkle/releases/download/2.9.3/Sparkle-2.9.3.tar.xz
          mkdir -p sparkle-tools && tar -xf sparkle.tar.xz -C sparkle-tools

          # EdDSA-sign the zip. The key comes from the CI secret, never the Keychain. Write it to
          # a restricted temp file so it isn't visible in the process list, then remove it.
          umask 077
          printf '%s' "$SPARKLE_ED_PRIVATE_KEY" > ed_private_key
          SIGNATURE=$(sparkle-tools/bin/sign_update --ed-key-file ed_private_key "$ZIP")
          rm -f ed_private_key
          echo "Signed: $SIGNATURE"

          ZIP_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/${RELEASE_TAG}/${ZIP}"
          PUBDATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")

          # A single-item appcast describing this release. Hosted as a release asset; the app's
          # SUFeedURL (releases/latest/download/appcast.xml) always resolves to the newest one.
          cat > appcast.xml <<XML
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" xmlns:dc="http://purl.org/dc/elements/1.1/">
            <channel>
              <title>Aranet4 Logger</title>
              <link>${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}</link>
              <description>Aranet4 Logger updates</description>
              <language>en</language>
              <item>
                <title>Version ${APP_VERSION}</title>
                <link>${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/${RELEASE_TAG}</link>
                <sparkle:version>${APP_VERSION}</sparkle:version>
                <sparkle:shortVersionString>${APP_VERSION}</sparkle:shortVersionString>
                <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
                <pubDate>${PUBDATE}</pubDate>
                <enclosure url="${ZIP_URL}" type="application/octet-stream" ${SIGNATURE} />
              </item>
            </channel>
          </rss>
          XML
          echo "--- appcast.xml ---"; cat appcast.xml

      - name: Build release notes from CHANGELOG
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -o pipefail
          # Pull the section for this version out of CHANGELOG.md (everything between this
          # version's "## [x.y.z]" heading and the next "## [" heading).
          section=$(awk -v ver="$APP_VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { flag=1; next }
            flag && /^## \[/ { exit }
            flag { print }
          ' CHANGELOG.md)
          # Strip leading/trailing blank lines.
          section=$(printf '%s\n' "$section" | sed -e '/./,$!d' | awk 'NF{p=NR} {a[NR]=$0} END{for(i=1;i<=p;i++) print a[i]}')
          if [ -z "$section" ]; then
            section="See the [commit history](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${RELEASE_TAG})."
          fi
          {
            echo "## What's Changed"
            echo
            echo "$section"
            echo
            echo "### Install"
            echo
            echo "Download \`$ZIP\`, unzip, and move **Aranet4Logger.app** to /Applications."
            echo
            echo "The app is signed with a self-signed certificate (not notarized), so on first launch macOS Gatekeeper warns it is from an unidentified developer. Right-click the app → **Open** → **Open** to run it, then grant Bluetooth access when prompted. After that, the app keeps itself up to date automatically."
            echo
            echo "**Full changelog:** [\`CHANGELOG.md\`](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/blob/${RELEASE_TAG}/CHANGELOG.md)"
          } > release_body.md
          echo "--- release_body.md ---"; cat release_body.md

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Aranet4 Logger ${{ steps.version.outputs.tag }}
          body_path: release_body.md
          files: |
            ${{ env.ZIP }}
            appcast.xml
