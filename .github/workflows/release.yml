name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag/version to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

jobs:
  release:
    name: Build & publish app
    runs-on: macos-15
    steps:
      - name: Validate manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          TAG: ${{ github.event.inputs.tag }}
        run: |
          if ! git ls-remote --exit-code --tags "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY.git" "refs/tags/$TAG" >/dev/null; then
            echo "Tag '$TAG' does not exist." >&2
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: version
        env:
          REF: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          echo "tag=$REF" >> "$GITHUB_OUTPUT"
          echo "version=${REF#v}" >> "$GITHUB_OUTPUT"

      - name: Install tools
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release app (ad-hoc signed)
        env:
          APP_VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -o pipefail
          xcodebuild build \
            -project Aranet4Logger.xcodeproj \
            -scheme Aranet4Logger \
            -configuration Release \
            -derivedDataPath build \
            MARKETING_VERSION="$APP_VERSION" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Package .app into a zip
        env:
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          APP="build/Build/Products/Release/Aranet4Logger.app"
          ZIP="Aranet4Logger-$RELEASE_TAG.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          echo "ZIP=$ZIP" >> "$GITHUB_ENV"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Aranet4 Logger ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: ${{ env.ZIP }}
          body: |
            Aranet4 Logger ${{ steps.version.outputs.tag }}

            Download `${{ env.ZIP }}`, unzip, and move **Aranet4Logger.app** to /Applications.

            The app is ad-hoc signed (built with a free Apple ID, not notarized), so on
            first launch macOS Gatekeeper will warn it is from an unidentified developer.
            Right-click the app → **Open** → **Open** to run it, then grant Bluetooth access
            when prompted.
