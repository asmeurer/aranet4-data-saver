name: Aranet4Logger
options:
  bundleIdPrefix: com.asmeurer
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    # Ad-hoc signing so the app builds headlessly and runs locally with a free
    # Apple ID. Switch CODE_SIGN_STYLE to Automatic + set your Personal Team in
    # Xcode's Signing tab for a stable identity (keeps the Bluetooth permission
    # grant from re-prompting across rebuilds).
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "YES"
    CODE_SIGNING_ALLOWED: "YES"

targets:
  Aranet4Logger:
    type: application
    platform: macOS
    sources:
      - Aranet4Logger
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asmeurer.Aranet4Logger
        PRODUCT_NAME: Aranet4Logger
        INFOPLIST_KEY_LSUIElement: "YES"
        ENABLE_HARDENED_RUNTIME: "YES"
        OTHER_LDFLAGS: "-lsqlite3"
    info:
      path: Aranet4Logger/Support/Info.plist
      properties:
        CFBundleName: Aranet4Logger
        CFBundleDisplayName: Aranet4 Logger
        # Inherit the version from build settings so the release workflow's
        # MARKETING_VERSION override (taken from the git tag) flows through.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSBluetoothAlwaysUsageDescription: "Aranet4 Logger connects to your Aranet4 sensors over Bluetooth to read and log air-quality data."
        NSBluetoothPeripheralUsageDescription: "Aranet4 Logger connects to your Aranet4 sensors over Bluetooth to read and log air-quality data."
    scheme:
      testTargets:
        - Aranet4LoggerTests

  # Logic tests for the hardware-independent code. The relevant source files are compiled
  # directly into the test bundle (no app host, no Bluetooth, no GUI), so the tests run
  # headlessly in CI.
  Aranet4LoggerTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Aranet4Logger/BLE/AranetProtocol.swift
      - Aranet4Logger/Support/TimeGrid.swift
      - Aranet4Logger/Support/AppSupport.swift
      - Aranet4Logger/Models/Models.swift
      - Aranet4Logger/Storage/Database.swift
      - Aranet4Logger/Collection/CSVImporter.swift
      - Aranet4Logger/Settings/UnitSettings.swift
      - Aranet4LoggerTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.asmeurer.Aranet4LoggerTests
        GENERATE_INFOPLIST_FILE: "YES"
        OTHER_LDFLAGS: "-lsqlite3"
